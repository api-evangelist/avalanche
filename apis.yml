name: Avalanche
description: Avalanche is a high-performance blockchain platform offering REST APIs
  via the Glacier/Data API for querying transactions, addresses, NFTs, token balances,
  and cross-chain activity on the Avalanche C-Chain, P-Chain, X-Chain, and over 100
  L1 subnets. The AvaCloud developer platform also exposes Metrics, RPC, and Webhooks
  APIs.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Blockchain
- Web3
- Avalanche
- NFT
- DeFi
- Cross-Chain
created: '2026-06-13'
modified: '2026-06-13'
url: https://raw.githubusercontent.com/api-evangelist/avalanche/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
- name: Avalanche Data API (Glacier)
  description: Query on-chain data from Avalanche networks — EVM balances, ERC-20/ERC-721/ERC-1155
    tokens, transactions, blocks, NFT metadata, UTXOs, validators, staking rewards,
    and interchain messaging across 100+ L1s.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developers.avacloud.io/data-api/overview
  baseURL: https://glacier-api.avax.network/v1
  tags:
  - Blockchain
  - Transactions
  - Balances
  - NFT
  - UTXOs
  - Validators
